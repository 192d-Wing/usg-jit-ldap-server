version: '3.8'
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ldap_dev
      POSTGRES_USER: ldap_dev
      POSTGRES_PASSWORD: ldap_dev_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ldap_dev"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
