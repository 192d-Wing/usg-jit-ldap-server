name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # Run full CI checks before building release
  # ---------------------------------------------------------------
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------
  # Build release binaries for x86_64 and arm64
  # ---------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [ci]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/release/usg-jit-ldap-server dist/
          cp LICENSE README.md config.example.toml dist/
          cp -r migrations dist/
          tar -czf usg-jit-ldap-server-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.arch }}
          path: usg-jit-ldap-server-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz

  # ---------------------------------------------------------------
  # Create GitHub release with all artifacts
  # ---------------------------------------------------------------
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx
          cargo cyclonedx --format json

      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            usg-jit-ldap-server-*.tar.gz
            *.cdx.json
