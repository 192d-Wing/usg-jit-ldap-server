name: CI

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ---------------------------------------------------------------
  # Lint: fmt + clippy + check
  # ---------------------------------------------------------------
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Check
        run: cargo check --all-targets

  # ---------------------------------------------------------------
  # Unit tests (no database required)
  # ---------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --lib --bins

  # ---------------------------------------------------------------
  # Integration tests (requires PostgreSQL)
  # ---------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ldap_test
          POSTGRES_USER: ldap_test
          POSTGRES_PASSWORD: ldap_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ldap_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://ldap_test:ldap_test_password@localhost:5432/ldap_test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests (serial — shared DB)
        run: cargo test --test '*' -- --test-threads=1

  # ---------------------------------------------------------------
  # End-to-end tests (full containerized stack with ldapsearch)
  # ---------------------------------------------------------------
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run e2e test stack
        run: |
          docker compose -f docker-compose.e2e.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from ldap-client
      - name: Clean up
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  # ---------------------------------------------------------------
  # Security audit (respects .cargo/audit.toml ignore list)
  # ---------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit

  # ---------------------------------------------------------------
  # Dependency license and policy check
  # ---------------------------------------------------------------
  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------
  # SBOM generation (CycloneDX format for ATO compliance)
  # ---------------------------------------------------------------
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-cyclonedx
      - run: cargo cyclonedx --format json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: bom.json

  # ---------------------------------------------------------------
  # Build release binary (only after all checks pass)
  # ---------------------------------------------------------------
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [check, test-unit, test-integration, test-e2e, audit]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: usg-jit-ldap-server
          path: target/release/usg-jit-ldap-server
