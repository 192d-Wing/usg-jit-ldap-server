name: CI

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ---------------------------------------------------------------
  # Lint: fmt + clippy + check
  # ---------------------------------------------------------------
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Check
        run: cargo check --all-targets

  # ---------------------------------------------------------------
  # Unit tests (no database required)
  # ---------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --lib --bins

  # ---------------------------------------------------------------
  # Integration tests (requires PostgreSQL)
  # ---------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ldap_test
          POSTGRES_USER: ldap_test
          POSTGRES_PASSWORD: ldap_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ldap_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://ldap_test:ldap_test_password@localhost:5432/ldap_test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests (serial — shared DB)
        run: cargo test --test '*' -- --test-threads=1

  # ---------------------------------------------------------------
  # End-to-end tests (full containerized stack with ldapsearch)
  # ---------------------------------------------------------------
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate test TLS certificates (CA + server + client)
        run: |
          mkdir -p tests/e2e/certs
          # Generate CA key and self-signed CA cert
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout tests/e2e/certs/ca.key -out tests/e2e/certs/ca.crt \
            -days 1 -nodes \
            -subj "/CN=Test CA/O=USG JIT LDAP Test/C=US" 2>/dev/null
          # Generate server key and CSR, sign with CA
          openssl req -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout tests/e2e/certs/server.key -out tests/e2e/certs/server.csr \
            -nodes \
            -subj "/CN=ldap-server/O=USG JIT LDAP Test/C=US" 2>/dev/null
          openssl x509 -req -in tests/e2e/certs/server.csr \
            -CA tests/e2e/certs/ca.crt -CAkey tests/e2e/certs/ca.key \
            -CAcreateserial -out tests/e2e/certs/server.crt \
            -days 1 \
            -extfile <(printf "subjectAltName=DNS:ldap-server,IP:127.0.0.1") 2>/dev/null
          # Generate client key and CSR, sign with CA
          openssl req -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout tests/e2e/certs/client.key -out tests/e2e/certs/client.csr \
            -nodes \
            -subj "/CN=e2e-test-client/O=USG JIT LDAP Test/C=US" 2>/dev/null
          openssl x509 -req -in tests/e2e/certs/client.csr \
            -CA tests/e2e/certs/ca.crt -CAkey tests/e2e/certs/ca.key \
            -CAcreateserial -out tests/e2e/certs/client.crt \
            -days 1 2>/dev/null
          chmod 644 tests/e2e/certs/server.key tests/e2e/certs/client.key tests/e2e/certs/ca.key
      - name: Run e2e test stack
        run: |
          docker compose -f docker-compose.e2e.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from ldap-client
      - name: Clean up
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  # ---------------------------------------------------------------
  # Security audit (respects .cargo/audit.toml ignore list)
  # ---------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit

  # ---------------------------------------------------------------
  # Dependency license and policy check
  # ---------------------------------------------------------------
  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------
  # SBOM generation (CycloneDX format for ATO compliance)
  # ---------------------------------------------------------------
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-cyclonedx
      - run: cargo cyclonedx --format json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: "*.cdx.json"
          if-no-files-found: warn

