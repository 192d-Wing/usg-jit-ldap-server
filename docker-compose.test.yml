version: "3.8"
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ldap_test
      POSTGRES_USER: ldap_test
      POSTGRES_PASSWORD: ldap_test_password
    ports:
      - "5433:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ldap_test"]
      interval: 2s
      timeout: 5s
      retries: 10
